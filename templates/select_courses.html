{% extends "base.html" %}
{% block title %}选择{{ platform_name }}课程 - 网课聚合提醒平台{% endblock %}
{% block content %}
<header class="page-header">
    <div>
        <p class="eyebrow">课程获取结果</p>
        <h1>选择要导入的课程</h1>
    </div>
    <a class="button" href="{{ url_for('platforms') }}">返回平台</a>
</header>

<form class="panel" method="post" action="{{ url_for('sync_platform', platform_name=platform_name) }}">
    <div class="panel-head">
        <h2>{{ platform_name }}</h2>
        <button class="button primary" type="submit">导入所选课程</button>
    </div>

    <div class="select-list">
        {% for course in fetched_courses %}
        <label class="select-course">
            <input type="checkbox" name="course_id" value="{{ course.external_id }}" checked>
            <span>
                <strong>{{ course.course_name }}</strong>
                <small>
                    {{ course.teacher or '教师待读取' }}
                    · 进度 {{ course.progress }}%
                    · 截止 {{ course.deadline_time|date_short }}
                    · 考试 {{ course.exam_time|date_short }}
                </small>
            </span>
            <mark class="status">{{ course.status }}</mark>
        </label>
        {% endfor %}
    </div>
</form>
{% endblock %}
