<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}网课聚合提醒平台{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    {% if g.user %}
    <aside class="sidebar">
        <div class="brand">
            <span class="brand-mark">课</span>
            <div>
                <strong>网课同步</strong>
                <small>学习任务聚合</small>
            </div>
        </div>
        <nav>
            <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' else '' }}">首页</a>
            <a href="{{ url_for('courses') }}" class="{{ 'active' if request.endpoint in ['courses', 'course_detail'] else '' }}">课程</a>
            <a href="{{ url_for('reminders') }}" class="{{ 'active' if request.endpoint == 'reminders' else '' }}">提醒</a>
            <a href="{{ url_for('platforms') }}" class="{{ 'active' if request.endpoint == 'platforms' else '' }}">平台绑定</a>
        </nav>
        <div class="user-box">
            <span>{{ g.user.username }}</span>
            <a href="{{ url_for('logout') }}">退出</a>
        </div>
    </aside>
    {% endif %}

    <main class="{{ 'layout' if g.user else 'auth-layout' }}">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-stack">
                {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
